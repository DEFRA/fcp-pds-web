environment: production
environmentCode: dev
ingress:
  class: nginx
  endpoint: fcp-pds-web-dev
  server: azure.defra.cloud
secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret

  secretObjects:
    - secretName: fcp-pds-web
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
paymentManagementService:
  url: #{container.paymentManagementServiceUrl}#
requestEditorService:
  url: #{container.requestEditorServiceUrl}#
