environment: production
environmentCode: pre
ingress:
  class: nginx
  endpoint: fcp-pds-web-pre
  server: azure.defra.cloud
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appInsights-connectionString
        objectType: secret

  secretObjects:
    - secretName: fcp-pds-web
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
paymentManagementService:
  url: #{container.paymentManagementServiceUrl}#
requestEditorService:
  url: #{container.requestEditorServiceUrl}#