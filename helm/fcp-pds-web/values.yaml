# Required values to support CI pipeline
environment: production
environmentCode:
name: fcp-pds-web
namespace: fcp-pds
workstream: fcp-pds
image: fcp-pds-web

labels:
  component: pds-web

paymentManagementService:
  url: "localhost:3008"

requestEditorService:
  url: "localhost:3001"

appInsights:
  connectionString:

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

containerConfigMap:
  name: fcp-pds-web-config-map

containerSecret: 
  name: fcp-pds-web
  type: Opaque

service:
  port: 80
  type: ClusterIP

deployment: {}

container:
  requestMemory: 500Mi
  requestCpu: 500m
  limitMemory: 800Mi
  port: 3023

ingress:
  class: nginx
  endpoint: fcp-pds-web
  server: example.com

livenessProbe:
  path: /healthz
  port: 3023
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  path: /healthy
  port: 3023
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

workloadIdentity: true

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: fcp-pds-web
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the applicatio

